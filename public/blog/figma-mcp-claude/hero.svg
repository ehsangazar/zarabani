<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B132B"/>
      <stop offset="0.5" stop-color="#1C2541"/>
      <stop offset="1" stop-color="#3A506B"/>
    </linearGradient>
    <linearGradient id="card" x1="350" y1="180" x2="1250" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#F2F7FF" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#18A0FB"/>
      <stop offset="1" stop-color="#00C896"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <circle cx="220" cy="180" r="140" fill="#18A0FB" fill-opacity="0.35" filter="url(#blur)"/>
  <circle cx="1360" cy="760" r="190" fill="#00C896" fill-opacity="0.28" filter="url(#blur)"/>
  <circle cx="1330" cy="170" r="120" fill="#FF7262" fill-opacity="0.25" filter="url(#blur)"/>

  <rect x="290" y="140" width="1020" height="620" rx="32" fill="url(#card)"/>
  <rect x="330" y="180" width="940" height="540" rx="24" fill="#0F172A"/>

  <rect x="370" y="230" width="360" height="42" rx="12" fill="#1E293B"/>
  <rect x="390" y="244" width="118" height="14" rx="7" fill="#18A0FB"/>
  <rect x="518" y="244" width="95" height="14" rx="7" fill="#94A3B8"/>
  <rect x="621" y="244" width="88" height="14" rx="7" fill="#00C896"/>

  <rect x="370" y="300" width="390" height="360" rx="18" fill="#111827" stroke="#334155"/>
  <rect x="795" y="300" width="435" height="165" rx="18" fill="#111827" stroke="#334155"/>
  <rect x="795" y="495" width="435" height="165" rx="18" fill="#111827" stroke="#334155"/>

  <text x="405" y="356" fill="#E2E8F0" font-size="44" font-family="Menlo, Monaco, Consolas, monospace">&lt;/&gt;</text>
  <text x="405" y="410" fill="#93C5FD" font-size="24" font-family="Menlo, Monaco, Consolas, monospace">from brief to first draft</text>
  <text x="405" y="450" fill="#A7F3D0" font-size="24" font-family="Menlo, Monaco, Consolas, monospace">with real design context</text>

  <text x="825" y="354" fill="#E2E8F0" font-size="30" font-family="Georgia, 'Times New Roman', serif">Figma MCP</text>
  <text x="825" y="392" fill="#93C5FD" font-size="20" font-family="Georgia, 'Times New Roman', serif">Real design context for AI tools</text>

  <text x="825" y="548" fill="#E2E8F0" font-size="30" font-family="Georgia, 'Times New Roman', serif">Claude Connection</text>
  <text x="825" y="586" fill="#A7F3D0" font-size="20" font-family="Georgia, 'Times New Roman', serif">Less handoff friction, more product clarity</text>

  <rect x="410" y="560" width="290" height="52" rx="14" fill="url(#accent)"/>
  <text x="451" y="594" fill="#00131F" font-size="24" font-family="Inter, Arial, sans-serif" font-weight="700">Design to Code</text>

</svg>
